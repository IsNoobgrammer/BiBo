# ============================================================
# Training Config
# ============================================================
training:
  seed: 42
  epochs: 15
  batch_size: 48
  seq_len: 256
  vocab_size: 2048
  lr: 2.0e-3
  warmup_ratio: 0.05
  weight_decay: 0.01
  grad_clip: 1.0
  train_samples: 24000
  val_samples: 4800
  optimizer: adamw_8bit  # adamw_8bit or adamw
  device: "cuda:0"
  num_workers: 2
  log_every_n_steps: 10
  use_wandb: true
  wandb_project: "bibo-ablation"
  wandb_run_name: "bibo-vs-qwen3moe-kaggle-t4"

# ============================================================
# BiBo Config
# ============================================================
bibo:
  vocab_size: 2048
  hidden_size: 512
  intermediate_size: 1536
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 2
  num_routed_experts: 8
  num_experts_per_tok: 3
  moe_intermediate_size: 384
  max_position_embeddings: 512
  use_ssmax: true
  router_type: "conv"
  router_lambda: 1.0
  router_noise: 0.3
  bias_update_factor: 0.01
  bias_update_threshold: 24576  # 2 steps × 48 batch × 256 seq
  mlp_only_layers: [0, 7]
  tie_word_embeddings: true

# ============================================================
# Qwen3MoE Config
# ============================================================
qwen3moe:
  vocab_size: 2048
  hidden_size: 512
  intermediate_size: 1536
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 2
  num_experts: 8
  num_experts_per_tok: 3
  moe_intermediate_size: 384
  max_position_embeddings: 512
  decoder_sparse_step: 1
  shared_expert_intermediate_size: 384
  tie_word_embeddings: true
