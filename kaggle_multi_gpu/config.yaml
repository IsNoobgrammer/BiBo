# ============================================================
# Training Config — Multi-GPU (2×T4)
# ============================================================
training:
  seed: 42
  epochs: 15
  batch_size: 128
  seq_len: 128
  vocab_size: 1024
  lr: 5.0e-2
  warmup_ratio: 0.05
  weight_decay: 0.01
  grad_clip: 1.0
  train_samples: 24000
  val_samples: 4800
  optimizer: adamw_8bit
  num_workers: 2
  log_every_n_steps: 10
  wandb_project: "bibo-ablation"
  wandb_run_name: "bibo-vs-qwen3moe-sort"

# ============================================================
# BiBo Config (~10M)
# ============================================================
bibo:
  device: "cuda:0"
  vocab_size: 1024
  hidden_size: 256
  intermediate_size: 512
  num_hidden_layers: 6
  num_attention_heads: 4
  num_key_value_heads: 2
  num_routed_experts: 8
  num_experts_per_tok: 3
  moe_intermediate_size: 256
  max_position_embeddings: 256
  use_ssmax: true
  router_type: "conv"
  router_lambda: 1.0
  router_noise: 0.3
  bias_update_factor: 0.01
  bias_update_threshold: 32768
  mlp_only_layers: [0, 5]
  tie_word_embeddings: true

# ============================================================
# Qwen3MoE Config (~10M)
# ============================================================
qwen3moe:
  device: "cuda:1"
  vocab_size: 1024
  hidden_size: 256
  intermediate_size: 512
  num_hidden_layers: 6
  num_attention_heads: 4
  num_key_value_heads: 2
  num_experts: 8
  num_experts_per_tok: 3
  moe_intermediate_size: 256
  max_position_embeddings: 256
  decoder_sparse_step: 1
  shared_expert_intermediate_size: 256
  tie_word_embeddings: true
