# Qwen3MoE 137.5M total / 71.4M active baseline (same skeleton as bibo.yaml: 10L, H512, 4h/2kv GQA 2:1,
# 9 homogeneous SwiGLU experts, no shared expert). Per-expert + dense widths IDENTICAL to BiBo
# (moe_intermediate 768, intermediate 1024) and now PARAM-MATCHED ON BOTH AXES: Qwen's 9 SwiGLU experts
# == BiBo's 9 PolyGLU experts in params; BiBo's 2 specials are free and its shared expert is OFF. The only
# architectural difference is homogeneous SwiGLU vs BiBo's diverse activations + param-free specials.
# Switch-Transformer aux load-balancing loss is ON (router_aux_loss_coef below; train.py passes
# output_router_logits=True for qwen). Training hyperparams identical to bibo.yaml.
model:
  type: "qwen3moe"
  vocab_size: 81000
  hidden_size: 512        # match BiBo (same attention shape, fair). head_dim 128.
  intermediate_size: 1024 # == BiBo (dense layers same width; comparison isolates expert count/type, not width)
  num_hidden_layers: 10
  num_attention_heads: 4
  num_key_value_heads: 2
  max_position_embeddings: 2048
  mlp_only_layers: [0, 9]
  num_experts: 9             # == BiBo's 9 GLU experts (param-matched on total + active)
  num_experts_per_tok: 2
  moe_intermediate_size: 768 # == BiBo's moe_intermediate. Per-expert width identical; Qwen's 9 SwiGLU == BiBo's 9 PolyGLU in params.
  decoder_sparse_step: 1
  norm_topk_prob: false
  router_aux_loss_coef: 0.01 # ablated consensus (Switch-T, ST-MoE, OLMoE all use 1e-2); HF's 0.001 was never ablated
  tie_word_embeddings: true
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-6
  attention_dropout: 0.0
  attention_bias: false
  use_sliding_window: false

training:
  batch_size: 16      # identical to bibo.yaml (fair comparison)
  grad_accum: 1
  use_fused_ce: true  # cuBLAS-chunked CE (see bibo.yaml) — identical CE path for both models
  total_steps: 50000
  warmup_steps: 100
  lr: 5.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  seq_len: 1024
  val_split: 0.05
  seed: 42
  deterministic: true
  optimizer: "muon_adamw"       # identical to bibo.yaml — Muon for 2D weights + fused fp32 AdamW for embeds/norms (fair comparison)
  muon_lr: 3.0e-4               # RMS-matched Muon (Moonlight/Kimi band); identical to bibo.yaml
  scheduler: "whd"              # WSD (Warmup-Stable-Decay), DEFAULT: 15% warmup → 60% hold → 25% linear decay→0 (fractions of total_steps); identical to bibo.yaml.
  muon_ns_steps: 5              # Turbo-Muon NS iters (ONLY active with --modded-muon; 1-5); identical to bibo.yaml. 5 = full Turbo NS, 4 = turbo.
  modded_muon: true            # Polar-Express NS coeffs (default). false = tuned quintic Moonlight NS.
  decay_frac: 0.05              # LEGACY — unused (whd now fractional WSD); kept only because train.py passes it. Identical to bibo.yaml.

eval:
  benchmarks: ["hellaswag"]
  eval_every: 500
  sample_every: 200
  max_eval_examples: 1024   # cap HellaSwag/ARC per eval (keeps eval fast; identical to bibo.yaml)

logging:
  wandb_project: "bibo-bench"
  wandb_name: "qwen3moe"
  log_every: 10
  log_internal_metrics: false

hardware:
  compile: true
  compile_optimizer: true    # torch.compile the Muon Newton-Schulz (Kaggle/T4 only; compile broken locally). Identical to bibo.yaml. ⚠ A/B vs eager Muon (bench/bench_muon.py) MUST pass numerics on T4 first.
  triton: true
  grad_checkpoint: false
  fsdp: true
