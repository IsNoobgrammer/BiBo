# Qwen3MoE ~77M baseline (same arch as BiBo, no shared expert)
model:
  type: "qwen3moe"
  vocab_size: 81000
  hidden_size: 320
  intermediate_size: 1024
  num_hidden_layers: 10
  num_attention_heads: 5
  num_key_value_heads: 1
  max_position_embeddings: 2048
  mlp_only_layers: [0, 9]
  num_experts: 8
  num_experts_per_tok: 2
  moe_intermediate_size: 768
  decoder_sparse_step: 1
  norm_topk_prob: false
  router_aux_loss_coef: 0.001
  tie_word_embeddings: true
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-6
  attention_dropout: 0.0
  attention_bias: false
  use_sliding_window: false

training:
  batch_size: 16
  grad_accum: 1
  total_steps: 50000
  warmup_steps: 100
  lr: 5.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  seq_len: 1024
  val_split: 0.05
  seed: 42
  deterministic: true
  optimizer: "adamw8bit"

eval:
  benchmarks: ["hellaswag", "arc_challenge"]
  eval_every: 500
  sample_every: 1000

logging:
  wandb_project: "bibo-bench"
  wandb_name: "qwen3moe"
  log_every: 10
  log_internal_metrics: false

hardware:
  compile: true
  triton: true
  grad_checkpoint: false
  fsdp: true
