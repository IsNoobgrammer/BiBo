# Qwen3MoE 128.0M total / 71.4M active baseline (same skeleton as bibo.yaml: 10L, H512, 4h/2kv GQA 2:1,
# 8 homogeneous SwiGLU experts, no shared expert). Per-expert + dense widths now IDENTICAL to BiBo
# (moe_intermediate 768, intermediate 1024) so the only edge is the 2 extra REAL experts (8 GLU vs
# BiBo's 6 GLU + 2 param-free specials): +8% total / +7% active — a BiBo win stays conservative.
# Switch-Transformer aux load-balancing loss is ON (router_aux_loss_coef below; train.py passes
# output_router_logits=True for qwen). Training hyperparams identical to bibo.yaml.
model:
  type: "qwen3moe"
  vocab_size: 81000
  hidden_size: 512        # match BiBo (same attention shape, fair). head_dim 128.
  intermediate_size: 1024 # == BiBo (dense layers same width; comparison isolates expert count/type, not width)
  num_hidden_layers: 10
  num_attention_heads: 4
  num_key_value_heads: 2
  max_position_embeddings: 2048
  mlp_only_layers: [0, 9]
  num_experts: 8
  num_experts_per_tok: 2
  moe_intermediate_size: 768 # == BiBo's moe_intermediate. Per-expert width identical now; Qwen's edge is purely the 2 extra REAL experts (BiBo has 6 GLU + 2 param-free Identity/Zero specials).
  decoder_sparse_step: 1
  norm_topk_prob: false
  router_aux_loss_coef: 0.01 # ablated consensus (Switch-T, ST-MoE, OLMoE all use 1e-2); HF's 0.001 was never ablated
  tie_word_embeddings: true
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-6
  attention_dropout: 0.0
  attention_bias: false
  use_sliding_window: false

training:
  batch_size: 16      # identical to bibo.yaml (fair comparison)
  grad_accum: 1
  use_fused_ce: true  # cuBLAS-chunked CE (see bibo.yaml) — identical CE path for both models
  total_steps: 50000
  warmup_steps: 100
  lr: 5.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  seq_len: 1024
  val_split: 0.05
  seed: 42
  deterministic: true
  optimizer: "adamw8bit"

eval:
  benchmarks: ["hellaswag"]
  eval_every: 500
  sample_every: 1000
  max_eval_examples: 1024   # cap HellaSwag/ARC per eval (keeps eval fast; identical to bibo.yaml)

logging:
  wandb_project: "bibo-bench"
  wandb_name: "qwen3moe"
  log_every: 10
  log_internal_metrics: false

hardware:
  compile: true
  triton: true
  grad_checkpoint: false
  fsdp: true
