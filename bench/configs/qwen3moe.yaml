# Qwen3MoE ~78M total / ~42M active baseline (same skeleton as bibo.yaml: 10L, H320, GQA 5:1,
# 8 homogeneous SwiGLU experts, no shared expert). Switch-Transformer aux load-balancing loss is
# ON (router_aux_loss_coef below; train.py passes output_router_logits=True for qwen).
# Training hyperparams identical to bibo.yaml.
model:
  type: "qwen3moe"
  vocab_size: 81000
  hidden_size: 512        # match BiBo (same attention shape, fair). head_dim 128.
  intermediate_size: 1280 # widened (loss is primary metric; Qwen handicapped wider)
  num_hidden_layers: 10
  num_attention_heads: 4
  num_key_value_heads: 2
  max_position_embeddings: 2048
  mlp_only_layers: [0, 9]
  num_experts: 8
  num_experts_per_tok: 2
  moe_intermediate_size: 896 # widened; experts kept at 8 (= BiBo's 8, but 2 of BiBo's are Identity/Zero specials, so Qwen's 8 full experts are already bigger). Target active ~45M max.
  decoder_sparse_step: 1
  norm_topk_prob: false
  router_aux_loss_coef: 0.01 # ablated consensus (Switch-T, ST-MoE, OLMoE all use 1e-2); HF's 0.001 was never ablated
  tie_word_embeddings: true
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-6
  attention_dropout: 0.0
  attention_bias: false
  use_sliding_window: false

training:
  batch_size: 16      # identical to bibo.yaml (fair comparison)
  grad_accum: 1
  total_steps: 50000
  warmup_steps: 100
  lr: 5.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  seq_len: 1024
  val_split: 0.05
  seed: 42
  deterministic: true
  optimizer: "adamw8bit"

eval:
  benchmarks: ["hellaswag", "arc_challenge"]
  eval_every: 500
  sample_every: 1000
  max_eval_examples: 1024   # cap HellaSwag/ARC per eval (keeps eval fast; identical to bibo.yaml)

logging:
  wandb_project: "bibo-bench"
  wandb_name: "qwen3moe"
  log_every: 10
  log_internal_metrics: false

hardware:
  compile: true
  triton: true
  grad_checkpoint: false
  fsdp: true
