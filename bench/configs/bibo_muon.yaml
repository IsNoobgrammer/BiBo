# Muon-vs-Manas A/B — MUON ARM (baseline). Run via bench/exp_manas.py (ALL fused kernels patched).
# IDENTICAL to bibo_manas.yaml except training.muon_optimizer. Muon here = FusedMuon ns8 aurora-K1
# (the exp_manas harness swaps it in; config's modded_muon/muon_ns_steps are IGNORED). Manas is this
# same base + the rolling probe, so a loss/OOD delta isolates exactly the probe.
model:
  type: "bibo"
  vocab_size: 81000
  hidden_size: 512
  intermediate_size: 1024
  num_hidden_layers: 10
  num_attention_heads: 4
  num_key_value_heads: 2
  use_ssmax: true
  use_xsa: true
  partial_rotary_factor: 0.334
  max_position_embeddings: 2048
  mlp_only_layers: [0, 9]
  polyglu_expert_multiplier: 3
  special_expert_pairs: 1
  num_experts_per_tok: 2
  moe_intermediate_size: 768
  use_shared_expert: false
  shared_expert_type: "mlp"
  router_type: "mlp"
  router_noise: 0.0
  bias_update_threshold: 100000
  bias_update_factor: 0.01
  tie_word_embeddings: true
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-6
  attention_dropout: 0.0
  attention_bias: false

training:
  batch_size: 16
  grad_accum: 1
  total_steps: 50000
  warmup_steps: 100
  lr: 5.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  seq_len: 1024
  val_split: 0.05
  seed: 42
  deterministic: true
  optimizer: "muon_adamw"       # routes to Muon+AdamW; exp_manas overrides the Muon sub-optimizer
  muon_optimizer: "muon"        # ARM: FusedMuon ns8 aurora-K1 (no probe) — the baseline
  muon_lr: 3.0e-4
  scheduler: "whd"
  muon_ns_steps: 5              # IGNORED by exp_manas (fixed ns8 schedule)
  modded_muon: true             # IGNORED by exp_manas
  decay_frac: 0.05

eval:
  benchmarks: ["hellaswag"]
  eval_every: 500
  sample_every: 200
  max_eval_examples: 1024

logging:
  wandb_project: "bibo-bench"
  wandb_name: "bibo-muon"
  log_every: 10
  log_internal_metrics: false

hardware:
  compile: false               # tkf fused kernels are validated EAGER (like exp_kappa). torch.compile
                               # feeds the custom Triton autograd.Functions non-guarded layouts ->
                               # CUDA illegal memory access. The kernels ARE the fusion; compile adds
                               # little here. (Old compile-works runs used the deleted in-repo Liger set.)
  compile_optimizer: false     # exp_manas builds FusedMuon/Manas directly (this key is unused here)
  grad_checkpoint: false
  fsdp: true
