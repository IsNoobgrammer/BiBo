# Kappa A/B experiment config — SMALL BiBo for local RTX 3050 runs (see bench/exp_kappa.py).
# Same recipe as bibo.yaml, shrunk: hidden 256, 6 layers, seq 512. Square (r=1) matrices = q/o_proj.
model:
  type: "bibo"
  vocab_size: 81000
  hidden_size: 256
  intermediate_size: 512
  num_hidden_layers: 6
  num_attention_heads: 4
  num_key_value_heads: 2
  use_ssmax: true
  use_xsa: true
  partial_rotary_factor: 0.334
  max_position_embeddings: 2048
  mlp_only_layers: [0, 5]
  polyglu_expert_multiplier: 3
  special_expert_pairs: 1
  num_experts_per_tok: 2
  moe_intermediate_size: 384
  use_shared_expert: false
  shared_expert_type: "mlp"
  router_type: "mlp"
  router_noise: 0.0
  bias_update_threshold: 100000
  bias_update_factor: 0.01
  tie_word_embeddings: true
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-6
  attention_dropout: 0.0
  attention_bias: false

training:
  batch_size: 8
  grad_accum: 1
  total_steps: 1200
  warmup_steps: 100
  lr: 5.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  seq_len: 512
  val_split: 0.05
  seed: 42
  deterministic: true
  optimizer: "muon_adamw"
  muon_lr: 3.0e-4
  scheduler: "whd"
  muon_ns_steps: 5
  modded_muon: true          # ignored: exp_kappa.py swaps in KappaMuon regardless
  decay_frac: 0.05

eval:
  benchmarks: []             # no hellaswag/arc downloads; val loss only
  eval_every: 200
  sample_every: 1000000      # no sampling (skips tokenizer download)
  max_eval_examples: 256

logging:
  wandb_project: "bibo-bench"
  wandb_name: "exp-kappa"
  log_every: 20
  log_internal_metrics: false

hardware:
  compile: false
  compile_optimizer: false
  grad_checkpoint: false
  fsdp: false
