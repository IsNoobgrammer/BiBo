# Muon-vs-Manas A/B — MANAS ARM (test). Run via bench/exp_manas.py (ALL fused kernels patched).
# IDENTICAL to bibo_muon.yaml except training.muon_optimizer + training.probe. Manas = the Muon
# baseline's ns8 aurora-K1 base + the Nexus rolling-probe gradient-alignment force (fwd/bwd run at
# theta+d; bench/train.py brackets each micro fwd/bwd with apply_probe/remove_probe).
model:
  type: "bibo"
  vocab_size: 81000
  hidden_size: 512
  intermediate_size: 1024
  num_hidden_layers: 10
  num_attention_heads: 4
  num_key_value_heads: 2
  use_ssmax: true
  use_xsa: true
  partial_rotary_factor: 0.334
  max_position_embeddings: 2048
  mlp_only_layers: [0, 9]
  polyglu_expert_multiplier: 3
  special_expert_pairs: 1
  num_experts_per_tok: 2
  moe_intermediate_size: 768
  use_shared_expert: false
  shared_expert_type: "mlp"
  router_type: "mlp"
  router_noise: 0.0
  bias_update_threshold: 100000
  bias_update_factor: 0.01
  tie_word_embeddings: true
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-6
  attention_dropout: 0.0
  attention_bias: false

training:
  batch_size: 16
  grad_accum: 1
  total_steps: 50000
  warmup_steps: 100
  lr: 5.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  seq_len: 1024
  val_split: 0.05
  seed: 42
  deterministic: true
  optimizer: "muon_adamw" # routes to Muon+AdamW; exp_manas overrides the Muon sub-optimizer
  muon_optimizer: "manas" # ARM: ManasOptimizer (ns8 aurora-K1 + rolling probe)
  probe: # ⚠ module defaults — gamma/rho are scale-dependent, SWEEP on the LM
    gamma: 0.08 #   probe dose (couples to LR/weight-norm/curvature; re-sweep per scale)
    rho: 0.98 #   probe memory in SAMPLES (rho* ~= 1 - batch/N_mem; re-derive per batch)
    rank: 8 #   low-rank d basis (None = full model-shaped fp32 d)
    refresh: 200 #   GaLore-style basis refresh interval (probe updates)
    # comp:                     #   u-buffer strength in units of gamma (omit/None = off)
  muon_lr: 3.0e-4
  scheduler: "whd"
  muon_ns_steps: 5 # IGNORED by exp_manas (fixed ns8 schedule)
  modded_muon: true # IGNORED by exp_manas
  decay_frac: 0.05

eval:
  benchmarks: ["hellaswag"]
  eval_every: 500
  sample_every: 200
  max_eval_examples: 1024

logging:
  wandb_project: "bibo-bench"
  wandb_name: "bibo-manas"
  log_every: 10
  log_internal_metrics: false

hardware:
  compile: true                # compile the model (T4). Pass --no_compile to run eager if needed.
  compile_optimizer: false # exp_manas builds FusedMuon/Manas directly (this key is unused here)
  grad_checkpoint: false
  fsdp: true
