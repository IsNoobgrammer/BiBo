# BiBo ~95M — Ablation: no SSMax attention
model:
  type: "bibo"
  vocab_size: 81000
  hidden_size: 320
  intermediate_size: 1024
  num_hidden_layers: 16
  num_attention_heads: 4
  num_key_value_heads: 2
  use_ssmax: false
  use_xsa: true
  rope_nope_ratio: 0.5
  max_position_embeddings: 2048
  mlp_only_layers: [0, 15]
  polyglu_expert_multiplier: 3     # 9 GLU experts — match bibo.yaml expert layout
  special_expert_pairs: 1          # + 2 param-free specials = 11 routed
  num_experts_per_tok: 2
  moe_intermediate_size: 768
  use_shared_expert: false
  router_type: "mlp"
  router_lambda: 1.0
  use_router_logit_norm: false
  router_noise: 0.0
  bias_update_threshold: 100000
  bias_update_factor: 0.01
  tie_word_embeddings: true
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-6
  attention_dropout: 0.0
  attention_bias: false

training:
  batch_size: 16
  grad_accum: 4
  total_steps: 50000
  warmup_steps: 1000
  lr: 3.0e-4
  muon_lr: 0.02
  weight_decay: 0.1
  grad_clip: 1.0
  seq_len: 1024
  val_split: 0.05
  seed: 42
  deterministic: true
  optimizer: "muon_adamw8bit"

eval:
  benchmarks: ["hellaswag"]
  eval_every: 500
  sample_every: 1000
  max_eval_examples: 1024   # cap HellaSwag/ARC per eval (keeps eval fast)

logging:
  wandb_project: "bibo-bench"
  wandb_name: "bibo-no-ssmax"
  log_every: 10
  log_internal_metrics: true

hardware:
  compile: true
  triton: true
  grad_checkpoint: false
  fsdp: true
