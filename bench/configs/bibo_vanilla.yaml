# BiBo VANILLA — all differentiators ablated OFF (use_ssmax/use_xsa false, rope_nope_ratio 0.0,
# router_type mlp). Matches a run launched with `--no-ssmax --no-xsa --no-partial-rope
# --no-conv-router`, so compare.py builds the SAME architecture the vanilla checkpoint was trained
# with (use_ssmax=False DROPS the per-layer ssmax_scale param — building from bibo.yaml would leave
# it at random init and mis-apply SSMax). Everything else identical to bibo.yaml.
# type stays "bibo" so the checkpoint filename (bibo_step_*.pt) and builder match.
model:
  type: "bibo"
  vocab_size: 81000
  hidden_size: 512
  intermediate_size: 1024
  num_hidden_layers: 10
  num_attention_heads: 4
  num_key_value_heads: 2
  use_ssmax: false                 # ABLATED
  use_xsa: false                   # ABLATED
  rope_nope_ratio: 0.0             # ABLATED (all-RoPE)
  max_position_embeddings: 2048
  mlp_only_layers: [0, 9]
  polyglu_expert_multiplier: 3     # 9 GLU experts — match bibo.yaml (param-matched to Qwen 9)
  special_expert_pairs: 1          # + 2 param-free specials = 11 routed
  num_experts_per_tok: 2
  moe_intermediate_size: 768
  use_shared_expert: false         # OFF (default) — match bibo.yaml / Qwen
  shared_expert_type: "mlp"
  router_type: "mlp"               # ABLATED (no conv router; already the default)
  router_lambda: 1.0
  use_router_logit_norm: false
  router_noise: 0.0
  bias_update_threshold: 100000
  bias_update_factor: 0.01
  moe_shared_scaling: 0.40
  tie_word_embeddings: true
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-6
  attention_dropout: 0.0
  attention_bias: false

training:
  batch_size: 16
  grad_accum: 1
  use_fused_ce: true
  total_steps: 50000
  warmup_steps: 100
  lr: 5.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  seq_len: 1024
  val_split: 0.05
  seed: 42
  deterministic: true
  optimizer: "muon_adamw"       # match bibo.yaml — Muon for 2D weights + fused fp32 AdamW for embeds/norms/scalars
  muon_lr: 3.0e-4               # RMS-matched Muon (Moonlight/Kimi band); see bibo.yaml

eval:
  benchmarks: ["hellaswag"]
  eval_every: 500
  sample_every: 1000
  max_eval_examples: 1024

logging:
  wandb_project: "bibo-bench"
  wandb_name: "bibo_vanilla"
  log_every: 10
  log_internal_metrics: false

hardware:
  compile: true
  triton: true
  grad_checkpoint: false
  fsdp: true
