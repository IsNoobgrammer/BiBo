# Kappa A/B v2 — SQUARE-HEAVY 137M-class BiBo for the RTX PRO 6000 (see bench/exp_kappa.py).
# vs v1 (bibo.yaml): MHA (kv=heads -> k/v square), intermediate=hidden and moe_intermediate=hidden
# (dense + expert down_proj square), conv router (exercises the fused router kernel), batch 32.
# Square Muon matrices per layer: q,k,v,o (512x512) + expert down slices (512x512) + dense down.
# Budget: 2000 steps x 32 x 1024 = 65.5M tokens.
model:
  type: "bibo"
  vocab_size: 81000
  hidden_size: 512
  intermediate_size: 512
  num_hidden_layers: 10
  num_attention_heads: 4
  num_key_value_heads: 4           # MHA: k/v projections become square (r=1)
  use_ssmax: true
  use_xsa: true
  partial_rotary_factor: 0.334
  max_position_embeddings: 2048
  mlp_only_layers: [0, 9]
  polyglu_expert_multiplier: 3
  special_expert_pairs: 1
  num_experts_per_tok: 2
  moe_intermediate_size: 512       # expert down_proj slices square (512x512)
  use_shared_expert: false
  shared_expert_type: "mlp"
  router_type: "conv"              # fused conv-router kernel path
  kernel_size: 3
  router_noise: 0.0
  bias_update_threshold: 100000
  bias_update_factor: 0.01
  tie_word_embeddings: true
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-6
  attention_dropout: 0.0
  attention_bias: false

training:
  batch_size: 32                   # 2x v1: bigger GEMMs, higher tps
  grad_accum: 1
  total_steps: 2000
  warmup_steps: 100
  lr: 5.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  seq_len: 1024
  val_split: 0.05
  seed: 42
  deterministic: true
  optimizer: "muon_adamw"
  muon_lr: 3.0e-4
  scheduler: "whd"
  muon_ns_steps: 5
  modded_muon: true                # ignored: exp_kappa.py swaps in KappaMuon
  decay_frac: 0.05

eval:
  benchmarks: []
  eval_every: 200
  sample_every: 1000000000
  max_eval_examples: 256

logging:
  wandb_project: "bibo-bench"
  wandb_name: "exp-kappa-v2"
  log_every: 20
  log_internal_metrics: false

hardware:
  compile: false
  compile_optimizer: false
  grad_checkpoint: false
  fsdp: false
