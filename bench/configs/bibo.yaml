# BiBo 137.5M total / 71.4M active (10L, H512, 4h/2kv GQA, PolyGLU 9 GLU + 2 param-free specials, NO shared expert, SSMax+XSA+partial-RoPE).
# MATCHED to qwen3moe.yaml on BOTH axes (Qwen 9 experts = 137.5M/71.4M): 9 GLU experts are param-identical to Qwen's 9 SwiGLU,
# specials (Identity/Zero) are free, shared expert OFF -> no active-param asymmetry. The ONLY architectural difference is
# diverse PolyGLU activations + param-free special experts vs Qwen's homogeneous SwiGLU. Clean isolation, no size confound either way.
# Load balancing = router-bias heuristic (no aux loss term). Pure-CE loss. Training hyperparams identical to qwen3moe.yaml.
model:
  type: "bibo"
  vocab_size: 81000
  hidden_size: 512       # 512/4 heads = head_dim 128 (tensor-core sweet spot; raises MFU vs hidden=320)
  intermediate_size: 1024
  num_hidden_layers: 10
  # --- Attention ablation axes (toggle one at a time vs this full-recipe baseline) ---
  num_attention_heads: 4
  num_key_value_heads: 2           # GQA: 2=GQA(2:1), 4=MHA (set =num_attention_heads to ablate GQA off)
  use_ssmax: true                  # SSMax length-aware query scaling
  use_xsa: true                    # Exclusive Self Attention rejection
  rope_nope_ratio: 0.5             # Partial RoPE: 0.5=2 RoPE+2 NoPE heads; 0.0=all-RoPE (ablate partial-RoPE off)
  max_position_embeddings: 2048
  mlp_only_layers: [0, 9]
  polyglu_expert_multiplier: 3    # 9 GLU experts (3 triplets of SiLU/ReLU²/Tanh) — param-matched to Qwen's 9
  special_expert_pairs: 1         # + 2 param-free specials (Identity, Zero) = 11 routed
  num_experts_per_tok: 2
  moe_intermediate_size: 768
  use_shared_expert: false        # OFF (default) — matches Qwen (no shared expert); keeps total+active param-matched
  shared_expert_type: "mlp"
  router_type: "mlp"
  router_lambda: 1.0
  use_router_logit_norm: false
  router_noise: 0.0
  bias_update_threshold: 100000
  bias_update_factor: 0.01
  moe_shared_scaling: 0.40
  tie_word_embeddings: true
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-6
  attention_dropout: 0.0
  attention_bias: false

training:
  batch_size: 16      # hidden=512
  grad_accum: 1
  use_fused_ce: true  # cuBLAS-chunked CE (default): cuBLAS-speed forward, never materializes (N,V) → bounded ~9G vs std-CE 14.5G. Set false for compiled standard CE. (NOT the old tl.dot kernel.)
  total_steps: 50000
  warmup_steps: 100
  lr: 5.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  seq_len: 1024
  val_split: 0.05
  seed: 42
  deterministic: true
  optimizer: "muon_adamw"       # Muon (Newton-Schulz orthogonalized) for 2D weights + FUSED fp32 AdamW for embeds/norms/scalars. Fused (not 8bit): T4 has memory to spare, fp32 states are cleaner + no bnb dependency. Use muon_adamw8bit if memory-bound.
  muon_lr: 0.02                 # Muon LR for 2D matrices (AdamW lr above = embeds/norms/shared-scaling); 0.02 is the modded-nanogpt default

eval:
  benchmarks: ["hellaswag"]
  eval_every: 500
  sample_every: 1000
  max_eval_examples: 1024   # cap HellaSwag/ARC per eval (full sets are ~10k/~1.2k, scored 1-example-at-a-time → slow, GPU-idle). Keeps eval fast.

logging:
  wandb_project: "bibo-bench"
  wandb_name: "bibo"
  log_every: 10
  log_internal_metrics: false

hardware:
  compile: true
  triton: true
  grad_checkpoint: false
  fsdp: true
