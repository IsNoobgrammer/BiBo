# BiBo ~72M total / ~39M active (10L, H320, PolyGLU 6+2 special, shared MLP expert, GQA 5:1, SSMax).
# Load balancing = router-bias heuristic (no aux loss term). Pure-CE loss.
# Training hyperparams kept identical to qwen3moe.yaml for a fair comparison.
model:
  type: "bibo"
  vocab_size: 81000
  hidden_size: 320
  intermediate_size: 1024
  num_hidden_layers: 10
  num_attention_heads: 4
  num_key_value_heads: 2
  max_position_embeddings: 2048
  mlp_only_layers: [0, 9]
  use_ssmax: true
  polyglu_expert_multiplier: 2
  special_expert_pairs: 1
  num_experts_per_tok: 2
  moe_intermediate_size: 768
  use_shared_expert: true
  shared_expert_type: "mlp"
  router_type: "mlp"
  router_lambda: 1.0
  use_router_logit_norm: false
  router_noise: 0.0
  bias_update_threshold: 100000
  bias_update_factor: 0.01
  moe_shared_scaling: 0.40
  tie_word_embeddings: true
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-6
  attention_dropout: 0.0
  attention_bias: false

training:
  batch_size: 16
  grad_accum: 1
  total_steps: 50000
  warmup_steps: 100
  lr: 5.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  seq_len: 1024
  val_split: 0.05
  seed: 42
  deterministic: true
  optimizer: "adamw8bit"

eval:
  benchmarks: ["hellaswag", "arc_challenge"]
  eval_every: 500
  sample_every: 1000

logging:
  wandb_project: "bibo-bench"
  wandb_name: "bibo"
  log_every: 10
  log_internal_metrics: false

hardware:
  compile: true
  triton: true
  grad_checkpoint: false
  fsdp: true
