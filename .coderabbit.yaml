# CodeRabbit Configuration for BiBo Repository
# Documentation: https://docs.coderabbit.ai/guides/configure-coderabbit

# Language settings
language: en-US

# Review settings
reviews:
  # Enable automatic reviews on PR creation
  auto_review:
    enabled: true
    
  # Review profile - controls depth and focus
  profile: assertive # Changed to assertive for stricter ML/research code review
  
  # Request changes workflow
  request_changes_workflow: true  # Enable to block merges on critical issues
  
  # High level summary
  high_level_summary: true
  
  # Poem in review (fun feature)
  poem: true
  
  # Review status
  review_status: true
  
  # Collapse walkthrough
  collapse_walkthrough: false
  
  # Path filters - focus on important files
  path_filters:
    - "!**/*.md"  # Skip markdown files (except CODERABBIT_SETUP.md)
    - "!**/logs/**"  # Skip log files
    - "!**/__pycache__/**"  # Skip Python cache
    - "!**/legacy/**"  # Skip legacy code (archived experiments)
    - "!**/*.log"  # Skip log files
    - "!**/.git/**"  # Skip git internals
    - "!**/events.out.tfevents.*"  # Skip TensorBoard logs
  
  # Auto-approve settings
  auto_approve:
    enabled: false  # Manual review required for research code
    
# Chat settings
chat:
  auto_reply: true

# Tools to enable
tools:
  # Static analysis
  ruff:
    enabled: true  # Python linter (faster than flake8)
  
  # Security scanning
  bandit:
    enabled: true  # Python security linter
  
  # Type checking
  mypy:
    enabled: true  # Python type checker
    
  # Complexity analysis
  mccabe:
    enabled: true

# Knowledge base - help CodeRabbit understand your project
knowledge_base:
  project_overview: "BiBo: PyTorch MoE transformer for research. Compare against Qwen3/Qwen3MoE baselines. Target: TPU v5e-8 (Kaggle), RTX 3050 (local). Framework: PyTorch + torch-xla."
  
  architecture: "BiBoConfig: feature toggles. BiBoAttention: GQA, MLKV, multiple variants. BiBoMoELayer: routed experts + shared Conv. BiBoMoERouter: MLP/Conv routing + load balancing."
  
  baselines: "baseline/qwen3: dense transformer. baseline/qwen3moe: sparse MoE. Read-only references."
  
  features: "CRITICAL: Every feature needs config toggle. use_ssmax, attention_type, router_type, num_routed_experts, num_shared_experts, moe_shared_scaling."
  
  compilation: "Must be torch.compile() + torch-xla compatible. Avoid Python control flow in forward(). Use static shapes. Prefer torch ops over numpy."
  
  testing: "tests/: pytest suite. tests/conftest.py: transformers stub. test_attention_variants.py: all attention tests. Must pass: finite outputs/grads, causality, shapes."
  
  quality: "Use einops. RMSNorm only. Type hints required. Docstrings required. Config validation in __init__."
  
  router_mechanisms: "Two independent mechanisms: (1) router_lambda controls confidence/entropy in expert selection (Skywork-MoE logit norm), (2) bias_update_* controls load balancing (which experts get used over time). They solve different problems."
  
  expert_types: "MLP (SwiGLU), Identity (skip), Zero (gating), Noise (regularization), ReLU (simple), Shared Conv1D (temporal). Each serves specific purpose in MoE architecture."
  
  experimental_workflow: "New features MUST start in experimental/ directory. Test thoroughly with wandb logging. Provide ablation results or validation evidence before moving to src/. Include config toggle with default value."
  
  validation_requirements: "Before merging experimental features: (1) wandb logs showing training stability, (2) ablation results comparing with/without feature, (3) expert utilization metrics for MoE changes, (4) TPU compilation test passing."
  
  moe_validation: "For MoE changes, check: load balance ratio (<0.3 good), router entropy (1.5-2.5 target), expert specialization (not all learning same), bias magnitude stabilization, no expert collapse."

# Early access features
early_access: true

# Tone of reviews (max 250 chars)
tone_instructions: "Review ML research code for PyTorch MoE transformer. Focus: feature toggles, compilation compatibility, tensor ops, numerical stability, memory efficiency, gradient flow, testing, docs. Be direct with examples and line numbers."

# BiBo-Specific Review Guidelines
review_guidelines:
  experimental_workflow:
    - "Check if new features start in experimental/ directory (not directly in src/)"
    - "Verify config toggle exists with default value for new features"
    - "Request wandb logs or ablation results for experimental features before src/ migration"
    - "Ensure experimental code has clear migration path documented"
  
  router_mechanisms:
    - "Distinguish router_lambda (confidence/entropy control) from bias_update_* (load balancing)"
    - "router_lambda: Controls HOW CONFIDENT the router is (low entropy = decisive)"
    - "bias_update_*: Controls WHICH EXPERTS get selected over time (fairness)"
    - "These are independent mechanisms solving different problems"
    - "Check comments correctly describe which mechanism is being modified"
  
  moe_validation:
    - "For MoE changes, require metrics: load balance ratio, router entropy, expert utilization"
    - "Check for expert collapse prevention (some experts never used)"
    - "Verify bias magnitude stabilizes during training"
    - "Ensure routing decisions are meaningful (not uniform distribution)"
    - "Request visualization of expert specialization if architecture changes"
  
  tpu_compilation:
    - "Flag Python control flow in forward() methods (breaks torch.compile)"
    - "Check for dynamic shapes (prefer static shapes for XLA)"
    - "Verify torch ops used instead of numpy (numpy breaks XLA graph)"
    - "Suggest torch.jit.script alternatives for complex logic"
    - "Request TPU compilation test results for core architecture changes"
  
  config_validation:
    - "Every new parameter MUST have validation in BiBoConfig.__init__()"
    - "Check for sensible default values (document reasoning)"
    - "Verify parameter interactions are validated (e.g., num_experts_per_tok <= num_experts)"
    - "Ensure config changes are documented in docs/configuration_guide.md"
  
  numerical_stability:
    - "Check for division by zero guards (add eps like 1e-6)"
    - "Verify gradient flow through custom operations"
    - "Flag operations that may produce NaN/Inf (log(0), sqrt(negative), etc.)"
    - "Suggest gradient clipping for new training features"
    - "Check normalization layers use RMSNorm (not LayerNorm)"
  
  evidence_requirements:
    - "Before merging experimental/ to src/: require wandb run links"
    - "For performance claims: require benchmark comparisons"
    - "For stability improvements: require loss curves over multiple runs"
    - "For MoE changes: require expert utilization plots"
    - "For attention changes: require attention pattern visualizations"
  
  code_quality:
    - "Verify type hints on all function signatures"
    - "Check docstrings follow Google style (Args, Returns, Raises)"
    - "Prefer einops over manual reshapes for clarity"
    - "Ensure tensor operations are batched (no loops over batch dimension)"
    - "Check for proper device handling (no hardcoded .cuda())"
