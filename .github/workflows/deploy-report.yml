name: Deploy Router Analysis Report

on:
  push:
    branches: [main]
    paths:
      - 'misc/kaggle/multi_gpu/report/**'
      - 'misc/kaggle/multi_gpu/plots/**'
      - '.github/workflows/deploy-report.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: misc/kaggle/multi_gpu/report/package-lock.json

      - name: Install dependencies
        working-directory: misc/kaggle/multi_gpu/report
        run: npm ci

      - name: Copy plots to public
        run: |
          mkdir -p misc/kaggle/multi_gpu/report/public/plots
          cp misc/kaggle/multi_gpu/plots/*.png misc/kaggle/multi_gpu/report/public/plots/

      - name: Build Next.js
        working-directory: misc/kaggle/multi_gpu/report
        run: npx next build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: misc/kaggle/multi_gpu/report/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
