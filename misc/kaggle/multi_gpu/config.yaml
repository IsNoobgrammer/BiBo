# ============================================================
# Training Config — Multi-GPU (2×T4)
# ============================================================
training:
  seed: 48
  epochs: 1
  batch_size: 64
  vocab_size: 512
  pad_token_id: 0
  lr: 3.0e-4
  warmup_ratio: 0.10
  weight_decay: 0.01
  grad_clip: 1.0
  train_samples: 300000
  val_samples: 3000
  val_every_n_steps: 300
  optimizer: adamw_8bit
  num_workers: 2
  log_every_n_steps: 10
  wandb_project: "bibo-ablation"
  wandb_run_name: "bibo-vs-qwen3moe-arithmetic-v1"

  # Task selection: "sort" or "arithmetic"
  task: "arithmetic"

  # NTIL loss weights (arXiv:2505.13077) — used for sort task
  alpha_emd: 0.0     # EMD token-level (ordinal distance)
  alpha_seq: 0.001       # Sequence-level (L1 on predicted vs target values)

  # Curriculum learning (disabled — using mixed dataset)
  curriculum: false
  curriculum_stages: [2, 64, 256]

  # Arithmetic task config
  arithmetic:
    max_num: 500          # Numbers in [1, max_num] (uses tokens 1..500, leaves 501-511 for special)
    operators: ["+", "-", "*", "//"]  # Available operators
    # Difficulty buckets: [min_terms, max_terms] per bucket
    buckets:
      - [3, 7]     # easy
      - [9, 16]    # medium
      - [19, 30]   # hard
      - [35, 50]   # pro
    # OOD (out-of-distribution) buckets for val only — generalization test
    ood_buckets:
      - [8, 8]     # gap between easy and medium
      - [17, 18]   # gap between medium and hard
      - [31, 33]   # gap between hard and pro
      - [52, 55]   # beyond pro
      - [60, 60]   # extreme generalization

# ============================================================
# BiBo Config (~10M) — Fair comparison mode (matches Qwen3MoE)
# ============================================================
bibo:
  device: "cuda:0"
  vocab_size: 512
  hidden_size: 256
  intermediate_size: 512
  num_hidden_layers: 6
  num_attention_heads: 4
  num_key_value_heads: 4

  # Expert layout: use_uniform_experts=true makes ALL experts SiLU GLU (like Qwen)
  # polyglu_expert_multiplier * 3 + special_expert_pairs * 2 = total routed experts
  # With uniform: all 8 are SiLU GLU, Identity/Zero are disabled
  polyglu_expert_multiplier: 2
  special_expert_pairs: 1
  use_uniform_experts: true   # <-- ALL experts use SiLU (matches Qwen3MoE)
  num_experts_per_tok: 2
  moe_intermediate_size: 256
  max_position_embeddings: 256

  # Disable BiBo-specific features for fair comparison
  use_ssmax: false

  # Shared expert OFF (Qwen3MoE has no shared expert)
  shared_expert_type: "mlp"
  use_shared_expert: false

  # Router: match Qwen3MoE behavior exactly
  router_type: "mlp"
  router_init: "normal"           # <-- Qwen uses normal init for router
  use_router_logit_norm: false    # No logit norm (Qwen doesn't use it)
  load_balance_strategy: "aux_loss"  # Load balancing via aux loss (same as Qwen)
  aux_loss_coef: 0.001            # Same coefficient as Qwen's router_aux_loss_coef
  router_lambda: 1.0
  router_noise: 0
  norm_topk_prob: false           # Qwen default

  moe_shared_scaling: 2.5
  bias_update_threshold: 6400
  mlp_only_layers: [0]
  tie_word_embeddings: true

# ============================================================
# Qwen3MoE Config (~10M)
# ============================================================
qwen3moe:
  device: "cuda:1"
  vocab_size: 512
  hidden_size: 256
  intermediate_size: 512
  num_hidden_layers: 6
  num_attention_heads: 4
  num_key_value_heads: 4
  num_experts: 8
  num_experts_per_tok: 2
  moe_intermediate_size: 256
  max_position_embeddings: 256
  decoder_sparse_step: 1
  router_aux_loss_coef: 0.001
  mlp_only_layers: [0]
  tie_word_embeddings: true
