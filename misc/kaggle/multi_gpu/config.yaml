# ============================================================
# Training Config — Multi-GPU (2×T4)
# ============================================================
training:
  seed: 48
  epochs: 1
  batch_size: 64
  vocab_size: 512
  pad_token_id: 0
  lr: 1.0e-4
  warmup_ratio: 0.10
  weight_decay: 0.01
  grad_clip: 1.0
  train_samples: 300000
  val_samples: 8000
  val_every_n_steps: 500
  optimizer: adamw_8bit
  num_workers: 2
  log_every_n_steps: 10
  wandb_project: "bibo-ablation"
  wandb_run_name: "bibo-vs-qwen3moe-sort-v2"

  # NTIL loss weights (arXiv:2505.13077)
  alpha_emd: 0.3       # EMD token-level (ordinal distance)
  alpha_seq: 0.3       # Sequence-level (L1 on predicted vs target values)

  # Curriculum learning (disabled — using mixed dataset)
  curriculum: false
  curriculum_stages: [2, 32, 64, 256]

# ============================================================
# BiBo Config (~10M)
# ============================================================
bibo:
  device: "cuda:0"
  vocab_size: 512
  hidden_size: 256
  intermediate_size: 512
  num_hidden_layers: 6
  num_attention_heads: 4
  num_key_value_heads: 2
  num_routed_experts: 8
  num_experts_per_tok: 3
  moe_intermediate_size: 256
  max_position_embeddings: 512
  use_ssmax: true
  router_type: "conv"
  router_lambda: 1.0
  router_noise: 0
  bias_update_threshold: 9500
  mlp_only_layers: [0]
  tie_word_embeddings: true

# ============================================================
# Qwen3MoE Config (~10M)
# ============================================================
qwen3moe:
  device: "cuda:1"
  vocab_size: 512
  hidden_size: 256
  intermediate_size: 512
  num_hidden_layers: 6
  num_attention_heads: 4
  num_key_value_heads: 2
  num_experts: 8
  num_experts_per_tok: 3
  moe_intermediate_size: 256
  max_position_embeddings: 512
  decoder_sparse_step: 1
  shared_expert_intermediate_size: 256
  mlp_only_layers: [0]
  tie_word_embeddings: true
